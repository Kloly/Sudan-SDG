name: Update Sudan parallel-market exchange rates

on:
  schedule:
    - cron: "0 * * * *"   # كل ساعة (بتوقيت UTC)
  workflow_dispatch: {}     # يسمح بالتشغيل اليدوي من تبويب Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "rate-bot"
          git config user.email "rate-bot@users.noreply.github.com"
          git add data/history.json
          if git diff --staged --quiet; then
            echo "لا توجد تغييرات لحفظها."
          else
            git commit -m "chore: تحديث أسعار العملات $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
